name: Agenda CI

on:
  push:
    branches: ["main"]

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      USER_NAME: "Carlos_Miranda_Becerra"

    steps:

      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Mostrar mensaje de inicio
        run: echo "Iniciando pruebas de la agenda de $USER_NAME"

      - name: Compilar proyecto
        run: javac Agenda.java AgendaTest.java

      - name: Ejecutar pruebas
        run: java AgendaTest
